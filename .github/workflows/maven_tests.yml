# Primary CI pipeline: Maven tests (Selenium + Cucumber + TestNG) + Allure on GitHub Pages
name: Maven Tests

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main
  schedule:
    # 09:00 UTC every 14th day of the month (approx. biweekly cadence)
    - cron: "0 9 */14 * *"

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CI: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 22 (Eclipse Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "22"
          cache: maven

      - name: Verify Java and Maven
        run: |
          java -version
          mvn --version

      - name: Install Google Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable
          google-chrome --version

      # Retries: shared demo URL + cross-region latency often cause transient failures on free runners
      - name: Run tests (headless)
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 22
          max_attempts: 3
          retry_wait_seconds: 45
          command: mvn test -Dheadless=true -Dparallel=none -DthreadCount=1

      # Surefire output helps diagnose assertion / WebDriver errors when the job fails
      - name: Upload Surefire reports (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports/
          if-no-files-found: warn
          retention-days: 7

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: target/allure-results/
          if-no-files-found: warn
          retention-days: 14

  # Static Allure HTML published to https://<owner>.github.io/<repo>/ (after one-time Pages setup)
  deploy-allure:
    concurrency:
      group: pages-${{ github.ref }}
      cancel-in-progress: false
    needs: test
    if: >-
      always() &&
      needs.test.result != 'cancelled' &&
      github.event_name != 'pull_request' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Download Allure results
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: allure-results
          path: allure-results

      - name: Set up Node.js (Allure CLI via npm)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Allure CLI
        run: npm install -g allure-commandline

      - name: Generate Allure static site
        run: |
          mkdir -p allure-results
          if [ ! "$(ls -A allure-results 2>/dev/null)" ]; then
            echo "No Allure results; publishing placeholder page"
            mkdir -p allure-report
            printf '%s\n' '<!DOCTYPE html><html><head><meta charset="utf-8"><title>Allure</title></head><body><p>No Allure results were produced for this run.</p></body></html>' > allure-report/index.html
          else
            allure generate allure-results -o allure-report --clean
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: allure-report

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
